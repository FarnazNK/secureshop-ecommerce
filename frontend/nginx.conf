# Nginx config for the SecureShop SPA.
# - Serves the Vite static bundle from /usr/share/nginx/html
# - Reverse-proxies /api/* to the backend container
# - Falls back to /index.html for client-side routing (React Router)

server {
    listen 8080;
    server_name _;

    # Don't leak the nginx version to clients.
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — defense in depth on top of what the backend sets.
    # CSP is intentionally not set here because Vite + Stripe + inline scripts
    # need careful tuning per environment; keep it as an explicit deployment
    # decision rather than a brittle default.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Reverse-proxy /api/* to the backend service. The hostname `backend`
    # resolves to the backend container via the docker-compose network.
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Cache hashed static assets aggressively. Vite emits content-hashed
    # filenames so cache invalidation is automatic on rebuild.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Don't cache index.html — we always want the freshest entry point so
    # users pick up new bundle hashes immediately after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback — any path that doesn't match a real file resolves to
    # index.html, letting React Router handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files (.git, .env, etc.) just in case something slips in.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # gzip — cheap latency win for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
